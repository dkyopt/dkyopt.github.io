<section
  class="visitor-map"
  data-visitor-map
  data-source="{{ site.visitor_map.data_file | prepend: base_path }}"
>
  <div class="visitor-map__header">
    <div>
      <h2 class="visitor-map__title">{{ site.visitor_map.title }}</h2>
      <p class="visitor-map__description">{{ site.visitor_map.description }}</p>
    </div>
    <div class="visitor-map__meta">
      <span class="visitor-map__pill" data-visitor-locations>0 locations</span>
      <span class="visitor-map__pill" data-visitor-events>0 recent visits</span>
      <span class="visitor-map__pill" data-visitor-updated>Waiting for first sync</span>
    </div>
  </div>

  <div class="visitor-map__body">
    <div class="visitor-map__canvas-wrap">
      <div class="visitor-map__canvas" data-visitor-map-canvas>
        <div class="visitor-map__status" data-visitor-status>Loading visitor map...</div>
      </div>
    </div>

    <aside class="visitor-map__sidebar">
      <h3 class="visitor-map__sidebar-title">Recent Visits</h3>
      <ul class="visitor-map__list" data-visitor-list>
        <li class="visitor-map__empty">No visitor data yet.</li>
      </ul>
      <p class="visitor-map__footnote">
        Location data is approximate and sourced from
        <a href="https://www.ip2map.com/" target="_blank" rel="noopener">IP2Map</a>.
      </p>
    </aside>
  </div>
</section>
